name: Android CI/CD & Auto Release 🚀

on:
  push:
    tags:
      - 'v*' # زمانی که تگی مانند v1.0.0 پش شود، این ورک‌فلو اجرا می‌شود.
  workflow_dispatch: # امکان اجرای دستی ورک‌فلو از بخش Actions در گیت‌هاب

jobs:
  build:
    name: Build & Release Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code 📂
        uses: actions/checkout@v4

      - name: Set up JDK 17 ☕
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew 🔑
        run: chmod +x gradlew

      # کامپایل و خروجی گرفتن نسخه Release (فایل‌های APK و AAB)
      - name: Build Release APK & Bundle (AAB) 🛠️
        run: ./gradlew assembleRelease bundleRelease --stacktrace

      # امضای آپ‌های خروجی (اختیاری - اگر مایلید اپ نسخه رسمی و امضا شده باشد)
      # اگر سکرت‌های مربوط به KeyStore را در بخش Secrets گیت‌هاب ست نکرده باشید، این بخش موقتاً با هشدار رد می‌شود 
      # یا می‌توانید از خروجی غیرامضا شده (Unsigned) برای تست مستقیم استفاده کنید.
      - name: Sign APK (Optional) ✍️
        id: sign_app
        uses: r0adrunner/sign-android-release@v1
        continue-on-error: true
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # ایجاد نسخه ریلیز خودکار در ریپازیتوری گیت‌هاب و آپلود فایل‌ها
      - name: Create GitHub Release 📦
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
