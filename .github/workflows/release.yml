name: Android CI/CD & Auto Release 🚀

on:
  push:
    tags:
      - 'v*' # Triggers workflow when pushing a tag like v1.0.0
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build & Release Android App
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required for creating GitHub Releases

    steps:
      - name: Checkout Code 📂
        uses: actions/checkout@v4

      - name: Set up JDK 21 ☕
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Gradle ⚙️
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      # ۱. دکود کردن مستقیم فایل کی‌استور در ریشه پروژه با نام دقیق release.keystore
      - name: Decode Release Keystore 🔑
        run: |
          if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
            echo "Decoding signing key..."
            echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.keystore
          else
            echo "⚠️ SIGNING_KEY secret missing!"
            exit 1
          fi

      # ۲. اجرای بیلد و تزریق متغیرها به گریدل (به همراه دادن مجوز اجرا)
      - name: Build & Auto Sign App 🛠️
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease bundleRelease --stacktrace
        env:
          KEYSTORE_PATH: "release.keystore"
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ۳. پاکسازی فایل حساس کی‌استور
      - name: Clean up Keystore 🧹
        run: rm -f release.keystore

      # ۴. آپلود فایل‌های خروجی امضا شده رسمی گریدل
      - name: Upload Build Artifacts to Actions Tab 📥
        uses: actions/upload-artifact@v4
        with:
          name: BuildReportYar-Release-Outputs
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

      # ۵. ایجاد خودکار نسخه در گیت‌هاب ریلیز
      - name: Create GitHub Release 📦
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
