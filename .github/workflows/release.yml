name: Android CI/CD & Auto Release 🚀

on:
  push:
    tags:
      - 'v*' # Triggers workflow when pushing a tag like v1.0.0
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build & Release Android App
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required for creating GitHub Releases

    steps:
      - name: Checkout Code 📂
        uses: actions/checkout@v4

      - name: Decode Debug Keystore 🔑
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found."
          fi

      - name: Set up JDK 21 ☕
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Gradle ⚙️
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1' # Fully compatible with AGP 9.1.1!
          validate-wrappers: false

      - name: Build Debug/Release APKs & Bundle (AAB) 🛠️
        run: gradle assembleDebug assembleRelease bundleRelease --stacktrace

      - name: Sign APK & AAB natively ✍️
        run: |
          if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
            echo "Signing key detected. Decrypting keystore file..."
            echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.keystore
            
            # 1. Sign Release APK using standard Android SDK apksigner
            echo "Locating apksigner tool..."
            BUILD_TOOLS_VERSION=$(ls -1 "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)
            APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner"
            echo "Using apksigner version in $BUILD_TOOLS_VERSION"
            
            UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*.apk" -not -name "*signed*")
            if [ -n "$UNSIGNED_APK" ] && [ -f "$UNSIGNED_APK" ]; then
              echo "Signing APK: $UNSIGNED_APK"
              $APKSIGNER sign --ks release.keystore \
                --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
                --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
                --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
                --out app/build/outputs/apk/release/BuildReportYar-release-signed.apk \
                "$UNSIGNED_APK"
              echo "Successfully signed custom APK."
            else
              echo "No unsigned APK found or signed APK already exists."
            fi
            
            # 2. Sign App Bundle (AAB) using native Oracle jarsigner from JDK
            AAB_FILE=$(find app/build/outputs/bundle/release -name "*.aab")
            if [ -n "$AAB_FILE" ] && [ -f "$AAB_FILE" ]; then
              echo "Signing App Bundle (AAB): $AAB_FILE"
              jarsigner -keystore release.keystore \
                -storepass "${{ secrets.KEY_STORE_PASSWORD }}" \
                -keypass "${{ secrets.KEY_PASSWORD }}" \
                "$AAB_FILE" \
                "${{ secrets.KEY_ALIAS }}"
              mv "$AAB_FILE" app/build/outputs/bundle/release/BuildReportYar-release-signed.aab
              echo "Successfully signed and renamed custom AAB."
            fi
            
            # Clean up the key store file so it does not persist
            rm -f release.keystore
          else
            echo "⚠️ SIGNING_KEY secret is not provided. Skipping signature steps. The outputs will remain unsigned."
          fi

      - name: Upload Build Artifacts to Actions Tab 📥
        uses: actions/upload-artifact@v4
        with:
          name: BuildReportYar-Release-Outputs
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

      - name: Create GitHub Release 📦
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*signed*.apk
            app/build/outputs/apk/release/*unsigned*.apk
            app/build/outputs/bundle/release/*.aab
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
