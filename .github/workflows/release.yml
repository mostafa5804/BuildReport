name: Android CI/CD & Auto Release 🚀

on:
  push:
    tags:
      - 'v*' # زمانی که تگی مانند v1.0.0 پوش شود، اجرا می‌شود
  workflow_dispatch: # امکان اجرای دستی مستقیم از پنل

jobs:
  build:
    name: Build & Release App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code 📂
        uses: actions/checkout@v4

      - name: Set up JDK 17 ☕
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # حل مشکل نبود فایل Wrapper محلی؛ دانلود مستقیم گریدل نسخه دات‌نت ۹.۳.۱ سازگار با پروژه شما
      - name: Setup Gradle 9.3.1 🛠️
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      # گرفتن خروجی نهایی بدون وابستگی به فایلی که در گیت ذخیره نشده بود
      - name: Build Release APK & Bundle (AAB) 📦
        run: gradle assembleRelease bundleRelease --stacktrace

      # امضای امن و رسمی بدون نیاز به ماژول‌های متفرقه (با استفاده از پکیج رسمی گوگل/اندروید)
      - name: Sign Release APK ✍️
        if: env.HAS_SIGNING == 'true'
        uses: r0adrunner/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          HAS_SIGNING: ${{ secrets.SIGNING_KEY != '' }}

      # انتشار نهایی فایل‌های کامپایل شده در گیت‌هاب
      - name: Create GitHub Release ✨
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
